<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Search Student</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fef9ff;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 40%;
            margin: 60px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #800080; 
            font-size: 32px;
            margin-bottom: 10px;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: #333;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        input[type="submit"] {
            background-color: #6a1b9a;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #4a148c;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Management System</h1>
        <h2><u>Search Student by Roll Number</u></h2>

        <form action="search_student.jsp" method="post">
            <label for="rollnumber">Student Roll Number:*</label>
            <input type="text" id="rollnumber" name="rollnumber" placeholder="Enter the Roll No" required>
            <br>
            <input type="submit" value="Search">
        </form>
    </div>

</body>
</html>
