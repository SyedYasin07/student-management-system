<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9ff;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0056b3;
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .gender-options {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .gender-options label {
            font-weight: normal;
        }
        .form-buttons {
            display: flex;
            justify-content: space-between;
        }
        input[type="submit"],
        input[type="reset"] {
            background-color: #0056b3;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #003e80;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Student Management System</h1>
        <h2><u>Add Student</u></h2>

        <form action="./add_student_controller.jsp" method="post">
            <label>Student Name:*</label>
            <input type="text" placeholder="Enter the name" name="studentname" required>

            <label>Student Roll Number:*</label>
            <input type="text" name="rollnumber" placeholder="Enter the RollNo" required>

            <label>Student Course:*</label>
            <select name="course" required>
                <option value="" disabled selected>Select a course</option>
                <option value="python">Python</option>
                <option value="Html">HTML</option>
                <option value="Angular">Angular</option>
                <option value="Java">Java</option>
                <option value="C++">C++</option>
            </select>

            <label>Student Gender:*</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="male" required> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
            </div>

            <label>Mobile Number:*</label>
            <input type="number" placeholder="Enter the number" name="phnumber" required>

            <div class="form-buttons">
                <input type="submit" value="Add Student">
                <input type="reset" value="Clear">
            </div>
        </form>
    </div>

</body>
</html>
