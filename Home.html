<html lang="en">
<head>

  <title>Student Management System</title>
  <style>
    * {
      margin: 0;

    body {
      background-color: #6a0dad;

      display: flex;

      font-size: 40px;
      color: orange;
      margin-bottom: 20px;
    }

    h2 {

    .menu a {

      margin: 10px 0;
      padding: 12px 20px;

      text-decoration: none;
      background-color: #9d4edd;
      border-radius: 10px;
      transition: background-color 0.3s ease, transform 0.2s ease;

    .menu a:hover {

      transform: scale(1.05);
